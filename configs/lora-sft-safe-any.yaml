# Safe catch-all preset for any model on 6GB VRAM
# Max compatibility at the cost of throughput
model: unsloth/Llama-3.2-3B-Instruct-bnb-4bit
data:
  format_type: chatml
training:
  training_type: lora
  max_seq_length: 1024
  load_in_4bit: true
  num_epochs: 3
  learning_rate: 0.0002
  batch_size: 1
  gradient_accumulation_steps: 8
  warmup_steps: 10
  save_steps: 50
  eval_steps: 50
  weight_decay: 0.01
  packing: true
  train_on_responses_only: true
  conversation_extension: 0
lora:
  lora_r: 8
  lora_alpha: 16
  lora_dropout: 0.0
  target_modules: "q_proj,k_proj,v_proj,o_proj,gate_proj,up_proj,down_proj"
logging:
  enable_tensorboard: true

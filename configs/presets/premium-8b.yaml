# Premium 8B preset optimized for 15GB+ VRAM (Colab T4/L4)
# Fine-tunes the highly intelligent Llama 3.1 8B Instruct base model.
model: "unsloth/meta-llama-3.1-8B-Instruct-bnb-4bit"
training:
  batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 2e-4
  warmup_steps: 20
lora:
  r: 32
  alpha: 64
  dropout: 0.05

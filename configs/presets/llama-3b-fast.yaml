# Llama-focused fast preset for Llama-3.2-3B on consumer GPUs
model: unsloth/Llama-3.2-3B-Instruct-bnb-4bit
training:
  max_seq_length: 2048
  num_epochs: 3
  learning_rate: 0.0002
  batch_size: 1
  gradient_accumulation_steps: 8
  warmup_steps: 10
  save_steps: 50
  eval_steps: 50
  weight_decay: 0.01
  packing: true
  train_on_responses_only: true
lora:
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.0

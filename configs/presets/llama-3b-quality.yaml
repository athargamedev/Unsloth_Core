# Llama-focused quality preset for Llama-3.2-3B (longer training, higher LoRA capacity)
model: unsloth/Llama-3.2-3B-Instruct-bnb-4bit
training:
  max_seq_length: 2048
  num_epochs: 5
  learning_rate: 0.00015
  batch_size: 1
  gradient_accumulation_steps: 12
  warmup_steps: 20
  save_steps: 50
  eval_steps: 50
  weight_decay: 0.01
  packing: true
  train_on_responses_only: true
lora:
  lora_r: 32
  lora_alpha: 64
  lora_dropout: 0.05
